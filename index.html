
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kilomètres tournée infirmière</title>
<style>
body{font-family:Arial;margin:20px;background:#f5f5f5}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:12px;border:0;border-radius:8px;margin:4px;font-weight:bold}
.primary{background:#111;color:white}
.secondary{background:#ddd}
input{width:100%;padding:10px;margin-top:5px;margin-bottom:10px}
.row{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #eee}
</style>
</head>
<body>

<div class="card">
<h2>Tournée</h2>

<label>Nom tournée</label>
<input id="tourName">

<label>Patient</label>
<input id="patientName">

<label>Adresse</label>
<input id="patientAddress">

<button id="startBtn" class="primary">Démarrer</button>
<button id="stopBtn" class="secondary">Arrêt</button>
<button id="resetBtn" class="secondary">Reset</button>
<button id="exportBtn" class="secondary">Export Excel</button>
<button id="shareBtn" class="secondary">Partager tournée GPS</button>

<div id="status" style="padding:10px;border-radius:8px;background:#eee;font-weight:bold;margin-top:10px;margin-bottom:10px">Statut : tournée non démarrée</div>
<h3 id="total">Total : 0 km</h3>

<div id="table"></div>
</div>

<script>
const STORAGE_KEY="tournee_infirmiere_data"
let running=false
let lastPoint=null
let stops=[]
let tourNameValue=""

function saveData(){
localStorage.setItem(STORAGE_KEY,JSON.stringify({
running:running,
lastPoint:lastPoint,
stops:stops,
tourName:document.getElementById("tourName").value
}))
}

function loadData(){
let raw=localStorage.getItem(STORAGE_KEY)
if(!raw) return
try{
let data=JSON.parse(raw)
running=!!data.running
lastPoint=data.lastPoint||null
stops=data.stops||[]
tourNameValue=data.tourName||""
}catch(e){}
}

function getPosition(){
return new Promise((res,rej)=>{
navigator.geolocation.getCurrentPosition(p=>{
res({lat:p.coords.latitude,lon:p.coords.longitude})
},rej,{enableHighAccuracy:true})
})
}

async function roadDistance(a,b){
let url=`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=false`
let r=await fetch(url)
let j=await r.json()
return j.routes[0].distance/1000
}

async function reverse(lat,lon){
try{
let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
let j=await r.json()
return j.display_name||""
}catch{return ""}
}

function render(){
let t=0
let html=""
stops.forEach(s=>{
t+=s.km
html+=`<div class="row">
<div>
<b>${s.patient}</b><br>
<small>${s.address}</small><br>
<small>GPS : ${typeof s.lat==="number" ? s.lat.toFixed(5) : ""}, ${typeof s.lon==="number" ? s.lon.toFixed(5) : ""}</small>
</div>
<div>${s.km.toFixed(2)} km</div>
</div>`
})
document.getElementById("table").innerHTML=html

document.getElementById("tourName").value=tourNameValue
document.getElementById("total").innerText="Total : "+t.toFixed(2)+" km"
let status=document.getElementById("status")
if(running){
status.innerText="Statut : tournée démarrée"
status.style.background="#dcfce7"
status.style.color="#166534"
}else{
status.innerText="Statut : tournée non démarrée"
status.style.background="#eee"
status.style.color="#111"
}
}

function updateTourName(){
tourNameValue=document.getElementById("tourName").value
saveData()
}

document.getElementById("startBtn").onclick=async()=>{
lastPoint=await getPosition()
running=true
tourNameValue=document.getElementById("tourName").value
saveData()
}

document.getElementById("stopBtn").onclick=async()=>{
if(!running) return

let p=await getPosition()
let km=await roadDistance(lastPoint,p)

let patient=document.getElementById("patientName").value||"Patient"
let addr=document.getElementById("patientAddress").value

if(!addr) addr=await reverse(p.lat,p.lon)

stops.push({patient:patient,address:addr,km:km,lat:p.lat,lon:p.lon})

lastPoint=p
saveData()

document.getElementById("patientName").value=""
document.getElementById("patientAddress").value=""

render()
}



document.getElementById("resetBtn").onclick=()=>{
stops=[]
running=false
lastPoint=null
tourNameValue=""
document.getElementById("patientName").value=""
document.getElementById("patientAddress").value=""
localStorage.removeItem(STORAGE_KEY)
render()
}

document.getElementById("exportBtn").onclick=()=>{
let rows=[["Patient","Adresse","Distance km","Latitude","Longitude"]]
stops.forEach(s=>{
rows.push([s.patient,s.address,s.km.toFixed(2),s.lat||"",s.lon||""])
})

let csv=rows.map(r=>r.join(";")).join("\n")

let blob=new Blob([csv])
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="tournee.csv"
a.click()
}

document.getElementById("shareBtn").onclick=async()=>{
if(stops.length===0){
alert("Aucun arrêt à partager")
return
}

let points=stops
.map(s=>{
if(typeof s.lat==="number" && typeof s.lon==="number") return `${s.lat},${s.lon}`
if(s.address&&s.address.trim()!=="") return s.address
return null
})
.filter(Boolean)

if(points.length===0){
alert("Aucun point disponible pour le GPS")
return
}

let base="https://www.google.com/maps/dir/"
let path=points.map(a=>encodeURIComponent(a)).join("/")
let url=base+path

if(navigator.share){
try{
await navigator.share({
title:"Tournée infirmière",
text:"Voici la tournée à ouvrir dans le GPS",
url:url
})
}catch(e){}
}else{
window.open(url,"_blank")
}
}

document.getElementById("tourName").addEventListener("input",updateTourName)

loadData()
render()
</script>

</body>
</html>
